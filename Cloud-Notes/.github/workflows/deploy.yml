name: 🚀 Build & Deploy to Azure

on:
  push:
    branches: [main]
    paths-ignore:
      - "README.md"
      - "terraform/**"
      - ".github/workflows/terraform.yml"
  workflow_dispatch:
    inputs:
      environment:
        description: "Target environment"
        required: true
        default: "prod"
        type: choice
        options: [prod, staging]

# Cancel any in-progress run on the same branch
concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

env:
  ACR_NAME:        ${{ vars.ACR_NAME || 'cloudnotesacr123' }}
  IMAGE_NAME:      cloud-notes
  RESOURCE_GROUP:  ${{ vars.RESOURCE_GROUP  || 'cloud-notes-rg' }}
  CONTAINER_GROUP: ${{ vars.CONTAINER_GROUP || 'cloud-notes-cg' }}

jobs:
  # ── 1. Build & push Docker image ──────────────────────────────────────────
  build:
    name: 🔨 Build & Push
    runs-on: ubuntu-latest
    outputs:
      image-tag: ${{ steps.meta.outputs.tag }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set image tag
        id: meta
        run: echo "tag=${{ github.sha }}" >> "$GITHUB_OUTPUT"

      - name: Log in to Azure
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Log in to ACR
        run: az acr login --name "$ACR_NAME"

      - name: Build & push (SHA + latest)
        run: |
          IMAGE="${ACR_NAME}.azurecr.io/${IMAGE_NAME}"
          TAG="${{ steps.meta.outputs.tag }}"
          docker build \
            --target runner \
            --label "git.sha=$TAG" \
            --label "git.ref=${{ github.ref }}" \
            -t "${IMAGE}:${TAG}" \
            -t "${IMAGE}:latest" \
            .
          docker push "${IMAGE}:${TAG}"
          docker push "${IMAGE}:latest"
          echo "✅ Pushed ${IMAGE}:${TAG}"

  # ── 2. Deploy to Azure Container Instances ────────────────────────────────
  deploy:
    name: 🎯 Deploy
    runs-on: ubuntu-latest
    needs: build
    environment: production

    steps:
      - name: Log in to Azure
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Restart container group (pull latest image)
        run: |
          az container restart \
            --resource-group "$RESOURCE_GROUP" \
            --name           "$CONTAINER_GROUP"

      - name: Wait for container to be Running
        run: |
          echo "Waiting for container to reach Running state…"
          for i in $(seq 1 12); do
            STATE=$(az container show \
              --resource-group "$RESOURCE_GROUP" \
              --name           "$CONTAINER_GROUP" \
              --query          "containers[0].instanceView.currentState.state" \
              --output         tsv 2>/dev/null || echo "Unknown")
            echo "  attempt $i: $STATE"
            if [ "$STATE" = "Running" ]; then
              echo "✅ Container is Running"
              exit 0
            fi
            sleep 10
          done
          echo "❌ Container did not reach Running state in time"
          exit 1

      - name: Print app URL
        run: |
          FQDN=$(az container show \
            --resource-group "$RESOURCE_GROUP" \
            --name           "$CONTAINER_GROUP" \
            --query          "ipAddress.fqdn" \
            --output         tsv)
          echo "🌐 App live at: http://${FQDN}:3000"
