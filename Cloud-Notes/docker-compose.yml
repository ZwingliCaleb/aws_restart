# version field is intentionally omitted (deprecated in Compose v2+)
services:
  web:
    build:
      context: .
      target: runner        # build only the production stage
    image: cloud-notes:local
    container_name: cloud-notes
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - PORT=3000
    volumes:
      - notes-data:/app/data  # persist notes across container restarts
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://localhost:3000/ || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

volumes:
  notes-data:
    driver: local
